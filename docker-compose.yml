services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      ALGOGYM_OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      ALGOGYM_CHROMA_PATH: /app/data/chroma
      ALGOGYM_DATABASE_URL: sqlite:////app/data/algogym.db
      ALGOGYM_UPLOAD_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3123:3000"
    depends_on:
      - backend

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma-server:/chroma/chroma
